<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosico Slots</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
        }

        /* Header - Coin Counter */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #1a1f3a 0%, #2a1f4a 100%);
            border-radius: 12px;
            border: 2px solid #d4af37;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 12px;
        }

        .coin-display {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5);
        }

        .coin-icon {
            font-size: 28px;
            animation: coin-spin 2s linear infinite;
        }

        @keyframes coin-spin {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #ff9f1c;
            text-shadow: 0 2px 8px rgba(255, 159, 28, 0.6);
            text-align: center;
            flex: 1;
        }

        /* Game Container */
        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }

        /* Slot Machine Frame */
        .slot-machine {
            background: linear-gradient(135deg, #1a1f3a 0%, #2a1f4a 100%);
            border: 8px solid #d4af37;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.2),
                0 0 20px rgba(212, 175, 55, 0.4);
            max-width: 100%;
            width: 100%;
        }

        /* Reels Container */
        .reels-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            perspective: 1000px;
        }

        .reel {
            width: 80px;
            height: 120px;
            background: linear-gradient(to bottom, #0f1629, #1a1f3a);
            border: 3px solid #ff9f1c;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            position: relative;
            overflow: hidden;
            box-shadow: 
                inset 0 0 10px rgba(0, 0, 0, 0.8),
                0 0 10px rgba(255, 159, 28, 0.3);
        }

        .reel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                135deg,
                transparent 0%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 100%
            );
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .reel.spinning {
            animation: reel-shake 0.1s infinite;
        }

        @keyframes reel-shake {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .reel-symbol {
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        /* Bet Selector */
        .bet-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .bet-btn {
            padding: 10px 16px;
            background: linear-gradient(135deg, #ff9f1c 0%, #ff7d00 100%);
            border: 2px solid #d4af37;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255, 159, 28, 0.3);
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .bet-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 6px rgba(255, 159, 28, 0.3);
        }

        .bet-btn.selected {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            transform: scale(1.05);
        }

        /* Spin Button */
        .spin-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #ffd700 50%, #d4af37 100%);
            border: 3px solid #fff;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .spin-button:active:not(:disabled) {
            transform: scale(0.98);
            box-shadow: 0 3px 10px rgba(212, 175, 55, 0.5);
        }

        .spin-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Result Display */
        .result-display {
            text-align: center;
            font-size: 18px;
            color: #ffd700;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.5);
            height: 28px;
            margin-top: 8px;
        }

        .result-display.win {
            color: #00ff00;
            text-shadow: 0 2px 8px rgba(0, 255, 0, 0.5);
            animation: pulse-text 0.5s ease-in-out;
        }

        .result-display.lose {
            color: #ff4444;
            text-shadow: 0 2px 8px rgba(255, 68, 68, 0.5);
        }

        .result-display.jackpot {
            color: #ff00ff;
            text-shadow: 0 2px 12px rgba(255, 0, 255, 0.6);
            font-size: 24px;
            animation: jackpot-pulse 0.3s ease-in-out 3;
        }

        @keyframes pulse-text {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes jackpot-pulse {
            0%, 100% { transform: scale(1) rotate(-2deg); }
            50% { transform: scale(1.15) rotate(2deg); }
        }

        /* Game Over Screen */
        .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 24px;
            padding: 20px;
        }

        .game-over-screen.hidden {
            display: none;
        }

        .game-over-content {
            text-align: center;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            color: #ff4444;
            text-shadow: 0 4px 12px rgba(255, 68, 68, 0.6);
            margin-bottom: 16px;
            animation: bounce 0.6s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .game-over-message {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 24px;
        }

        .restart-button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #d4af37 0%, #ffd700 50%, #d4af37 100%);
            border: 3px solid #fff;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            transition: all 0.2s;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .restart-button:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(212, 175, 55, 0.5);
        }

        /* Particle Effects */
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 32px;
            opacity: 1;
        }

        .particle.confetti {
            animation: fall 2s ease-in forwards;
        }

        @keyframes fall {
            to {
                opacity: 0;
                transform: translateY(300px) rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header {
                padding: 10px 12px;
                margin-bottom: 8px;
            }

            .coin-display {
                font-size: 18px;
                gap: 6px;
            }

            .coin-icon {
                font-size: 20px;
            }

            .title {
                font-size: 16px;
            }

            .slot-machine {
                padding: 16px;
                margin-bottom: 8px;
            }

            .reel {
                width: 70px;
                height: 100px;
                font-size: 40px;
            }

            .bet-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .spin-button {
                padding: 12px;
                font-size: 16px;
                letter-spacing: 1px;
            }

            .result-display {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div></div>
        <div class="title">🐱 HOSICO SLOTS 🐱</div>
        <div class="coin-display">
            <span class="coin-icon">💰</span>
            <span id="coinCount">1000</span>
        </div>
    </div>

    <!-- Game Container -->
    <div class="game-container">
        <div class="slot-machine">
            <!-- Reels -->
            <div class="reels-container">
                <div class="reel" id="reel0">
                    <span class="reel-symbol">🐱</span>
                </div>
                <div class="reel" id="reel1">
                    <span class="reel-symbol">⭐</span>
                </div>
                <div class="reel" id="reel2">
                    <span class="reel-symbol">🌙</span>
                </div>
            </div>

            <!-- Bet Selector -->
            <div class="bet-selector">
                <button class="bet-btn selected" data-bet="10">Bet 10</button>
                <button class="bet-btn" data-bet="25">Bet 25</button>
                <button class="bet-btn" data-bet="50">Bet 50</button>
                <button class="bet-btn" data-bet="100">Bet 100</button>
            </div>

            <!-- Spin Button -->
            <button class="spin-button" id="spinBtn">SPIN</button>

            <!-- Result Display -->
            <div class="result-display" id="resultDisplay"></div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="game-over-screen hidden" id="gameOverScreen">
        <div class="game-over-content">
            <div class="game-over-title">💔 GAME OVER 💔</div>
            <div class="game-over-message">Your coins are gone! Better luck next time!</div>
            <button class="restart-button" id="restartBtn">RESTART GAME</button>
        </div>
    </div>

    <script>
        // Game State
        let gameState = {
            coins: 1000,
            currentBet: 10,
            isSpinning: false,
            symbols: ['🐱', '⭐', '🌙', '💎', '🔥', '🍀']
        };

        // Payout multipliers
        const payoutMultipliers = {
            '🐱': 50,
            '⭐': 40,
            '🌙': 30,
            '💎': 25,
            '🔥': 20,
            '🍀': 10
        };

        // Initialize Telegram WebApp
        if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
            Telegram.WebApp.expand();
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        // DOM Elements
        const spinBtn = document.getElementById('spinBtn');
        const reels = [
            document.getElementById('reel0'),
            document.getElementById('reel1'),
            document.getElementById('reel2')
        ];
        const coinCount = document.getElementById('coinCount');
        const resultDisplay = document.getElementById('resultDisplay');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const restartBtn = document.getElementById('restartBtn');

        // Event Listeners
        spinBtn.addEventListener('click', spin);
        restartBtn.addEventListener('click', restart);

        document.querySelectorAll('.bet-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                gameState.currentBet = parseInt(e.target.dataset.bet);
            });
        });

        // Main Spin Function
        async function spin() {
            if (gameState.isSpinning || gameState.coins < gameState.currentBet) {
                return;
            }

            gameState.coins -= gameState.currentBet;
            updateCoinDisplay();

            gameState.isSpinning = true;
            spinBtn.disabled = true;
            resultDisplay.textContent = '';
            resultDisplay.className = 'result-display';

            // Spin each reel with staggered timing
            const results = [];
            for (let i = 0; i < 3; i++) {
                await spinReel(i);
                const result = getRandomSymbol();
                results.push(result);
            }

            gameState.isSpinning = false;
            spinBtn.disabled = false;

            // Check results
            await checkWin(results);

            // Check Game Over
            if (gameState.coins <= 0) {
                gameOverScreen.classList.remove('hidden');
            }
        }

        // Spin individual reel
        async function spinReel(reelIndex) {
            const reel = reels[reelIndex];
            reel.classList.add('spinning');

            return new Promise((resolve) => {
                const spinDuration = 800 + reelIndex * 200; // Staggered timing
                const startTime = Date.now();

                const spinInterval = setInterval(() => {
                    const symbol = gameState.symbols[Math.floor(Math.random() * gameState.symbols.length)];
                    reel.querySelector('.reel-symbol').textContent = symbol;
                }, 50);

                setTimeout(() => {
                    clearInterval(spinInterval);
                    reel.classList.remove('spinning');
                    resolve();
                }, spinDuration);
            });
        }

        // Get random symbol
        function getRandomSymbol() {
            return gameState.symbols[Math.floor(Math.random() * gameState.symbols.length)];
        }

        // Check win condition
        async function checkWin(results) {
            const [r0, r1, r2] = results;

            // Check for 3-match (jackpot or big win)
            if (r0 === r1 && r1 === r2) {
                const multiplier = payoutMultipliers[r0];
                const winAmount = gameState.currentBet * multiplier;
                gameState.coins += winAmount;
                updateCoinDisplay();

                // Special jackpot animation for cat
                if (r0 === '🐱') {
                    resultDisplay.classList.add('jackpot');
                    resultDisplay.textContent = `🎉 JACKPOT! +${winAmount} coins! 🎉`;
                    await triggerJackpot();
                } else {
                    resultDisplay.classList.add('win');
                    resultDisplay.textContent = `🎊 BIG WIN! +${winAmount} coins! 🎊`;
                    await triggerWinAnimation();
                }
            }
            // Check for 2-match (small win)
            else if ((r0 === r1 && r0 !== r2) || (r1 === r2 && r1 !== r0) || (r0 === r2 && r0 !== r1)) {
                const matchSymbol = (r0 === r1) ? r0 : (r1 === r2) ? r1 : r0;
                const baseMultiplier = payoutMultipliers[matchSymbol];
                const multiplier = baseMultiplier >= 40 ? 3 : 2; // Higher multiplier for rare symbols
                const winAmount = gameState.currentBet * multiplier;
                gameState.coins += winAmount;
                updateCoinDisplay();

                resultDisplay.classList.add('win');
                resultDisplay.textContent = `✨ You win! +${winAmount} coins! ✨`;
                await triggerWinAnimation();
            }
            // No match (lose)
            else {
                resultDisplay.classList.add('lose');
                resultDisplay.textContent = '❌ No match, try again!';
            }
        }

        // Trigger win animation
        async function triggerWinAnimation() {
            const confettiSymbols = ['🎊', '🎉', '✨', '⭐', '💫', '🌟'];
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle confetti';
                particle.textContent = confettiSymbols[Math.floor(Math.random() * confettiSymbols.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '-30px';
                particle.style.animation = `fall ${1.5 + Math.random() * 0.5}s ease-in forwards`;
                particle.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 2500);
            }
        }

        // Trigger jackpot animation
        async function triggerJackpot() {
            // Screen shake
            for (let i = 0; i < 8; i++) {
                document.body.style.transform = `translate(${Math.random() * 10 - 5}px, ${Math.random() * 10 - 5}px)`;
                await new Promise(resolve => setTimeout(resolve, 30));
            }
            document.body.style.transform = '';

            // Massive confetti
            const confettiSymbols = ['🎊', '🎉', '✨', '⭐', '💫', '🌟', '🐱', '💰'];
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle confetti';
                particle.textContent = confettiSymbols[Math.floor(Math.random() * confettiSymbols.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = '-30px';
                particle.style.fontSize = (24 + Math.random() * 20) + 'px';
                particle.style.animation = `fall ${2 + Math.random() * 0.5}s ease-in forwards`;
                particle.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 2800);
            }
        }

        // Update coin display
        function updateCoinDisplay() {
            coinCount.textContent = gameState.coins;
        }

        // Restart game
        function restart() {
            gameState.coins = 1000;
            updateCoinDisplay();
            gameOverScreen.classList.add('hidden');
            resultDisplay.textContent = '';
            resultDisplay.className = 'result-display';

            // Reset reels to initial symbols
            reels[0].querySelector('.reel-symbol').textContent = '🐱';
            reels[1].querySelector('.reel-symbol').textContent = '⭐';
            reels[2].querySelector('.reel-symbol').textContent = '🌙';
        }
    </script>
</body>
</html>
